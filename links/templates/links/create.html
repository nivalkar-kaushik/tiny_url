<div class="p-4 bg-green-50 border border-green-300 rounded-lg text-left">
    <p class="text-green-700 text-sm font-medium mb-2">Short URL created successfully!</p>
    <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-md px-3 py-2">
        <a
            href="{{ short_url }}"
            target="_blank"
            class="flex-1 text-blue-600 hover:underline text-sm truncate"
        >
            {{ short_url }}
        </a>
        <button
            onclick="copyUrl('{{ short_url }}')"
            id="copy-btn"
            class="shrink-0 px-3 py-1.5 text-xs font-medium bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors"
        >
            Copy
        </button>
    </div>
</div>

<script>
function copyUrl(url) {
    navigator.clipboard.writeText(url).then(function() {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.replace('bg-blue-600', 'bg-green-600');
        btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
        setTimeout(function() {
            btn.textContent = 'Copy';
            btn.classList.replace('bg-green-600', 'bg-blue-600');
            btn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
        }, 2000);
    });
}
</script>
