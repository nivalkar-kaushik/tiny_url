{% extends "base.html" %}

{% block title %}Protected Link | TinyURL{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <div class="text-4xl mb-4 text-center">🔒</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Protected Link</h1>
    <p class="text-gray-500 text-sm mb-6 text-center">Enter the password to access this link.</p>
    <form method="post">
      {% csrf_token %}
      {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded-md text-sm mb-4">{{ error }}</div>
      {% endif %}
      <input
        type="password"
        name="password"
        placeholder="Password"
        autofocus
        class="w-full px-3 py-2 border rounded-md mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
      >
        Access Link
      </button>
    </form>
  </div>
</div>
{% endblock %}
