{% extends "base.html" %}

{% block title %}Link Expired | TinyURL{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center px-4">
        <div class="text-6xl mb-6">⏰</div>
        <h1 class="text-3xl font-bold text-gray-800 mb-3">Link Expired</h1>
        <p class="text-gray-500 mb-8">This short URL has expired and is no longer active.</p>
        <a href="{% url 'links:home' %}"
           class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 transition">
            Create a new link →
        </a>
    </div>
</div>
{% endblock %}
